name: CI

"on":
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python files
        run: |
          python -m py_compile app/main.py app/config.py app/providers/*.py app/db.py app/history.py

      - name: Start app
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8090 > /tmp/tts-api-switcher.log 2>&1 &
          echo $! > /tmp/tts-api-switcher.pid
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8090/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Application did not become ready in time"
          cat /tmp/tts-api-switcher.log
          exit 1

      - name: Check health
        run: |
          curl -fsS http://127.0.0.1:8090/health

      - name: Check providers
        run: |
          curl -fsS http://127.0.0.1:8090/api/providers

      - name: Generate mock audio
        run: |
          curl -fsS -X POST http://127.0.0.1:8090/api/generate-audio \
            -H "Content-Type: application/json" \
            -d '{"text":"Teste CI com provider mock","provider":"mock","language":"pt-BR","voice":"","speed":1.0}'

      - name: Check history
        run: |
          curl -fsS http://127.0.0.1:8090/api/history

      - name: Docker build
        run: |
          docker build -t tts-api-switcher-ci .

      - name: Show app logs on failure
        if: failure()
        run: |
          cat /tmp/tts-api-switcher.log || true
