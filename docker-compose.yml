services:
  tts-api-switcher:
    build: .
    container_name: tts-api-switcher
    ports:
      - "8090:8090"
    env_file:
      - .env
    volumes:
      - ./app/generated:/app/app/generated
      - ./app/data:/app/app/data
      - /srv/secrets:/srv/secrets:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
